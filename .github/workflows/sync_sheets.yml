name: Sync Google Sheets Data

on:
  schedule:
    - cron: '0 0 * * *' # Tự động kích hoạt lúc 00:00 UTC (07:00 sáng giờ Việt Nam) hàng ngày
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công bất cứ lúc nào trên web GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền ghi mã nguồn để GitHub Actions đẩy file json mới lên kho

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run synchronization script
      run: python sync.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add lessons.json
        # Chỉ commit nếu file lessons.json thực sự có sự thay đổi dữ liệu mới
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Tự động cập nhật bài học từ Google Sheet" && git push)
